<!DOCTYPE html>
<html lang="id">

<head>
  <link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Rubik+Marker+Hatch&display=swap"
rel="stylesheet">
  
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    Export Setlist
  </title>

  <link
    rel="stylesheet"
    href="global.css"
  >

  <link
    rel="stylesheet"
    href="export.css"
  >

</head>

<body>

  <header class="top-header">

    <div class="header-inner">

      <img
        src="assets/logo.png"
        class="header-logo"
      >

      <div class="brand-title">
        BNB
      </div>

    </div>

  </header>

  <main class="page-wrapper">

    <h1 class="page-title">
      Export Setlist
    </h1>

    <div class="export-form">

      <input
        id="event-name"
        type="text"
        placeholder="Nama Acara"
      >

      <input
        id="event-date"
        type="text"
        placeholder="Tanggal Acara"
      >

      <input
        id="event-location"
        type="text"
        placeholder="Lokasi Acara"
      >

    </div>

    <div id="export-table">
    </div>

  </main>

  <script src="export.js"></script>

</body>
</html>
