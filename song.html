<!DOCTYPE html>
<html lang="id">

<head>
  <link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Rubik+Marker+Hatch&display=swap"
rel="stylesheet">
  
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>SONG</title>

  <link
  rel="stylesheet"
  href="css/style.css">
  
  <link
    rel="stylesheet"
    href="css/song.css">
  
<meta
  name="theme-color"
  content="#000000">

  <meta
  name="apple-mobile-web-app-capable"
  content="yes">

<meta
  name="apple-mobile-web-app-status-bar-style"
  content="black-translucent">

  <link
  rel="manifest"
  href="manifest.json">
</head>

<body>

<div class="floating-tools">

  <button onclick="history.back()">
    «
  </button>

  <button onclick="toggleTheme()">
    ♋
  </button>

  <button onclick="transpose(-1)">
    ♭
  </button>
  
  <button onclick="transpose(1)">
    ♯
  </button>

  <button onclick="toggleNashville()">
  ☢
</button>

  <button onclick="zoomOut()">
    A-
  </button>

  <button onclick="zoomIn()">
    A+
  </button>

  <button onclick="toggleFullscreen()">
  ☠
</button>

</div>

<header class="top-header">
  <div class="header-inner">
    <img
      src="assets/logo.png"
      class="header-logo">
    <div class="brand-title">
      Bass -not- ssoB
    </div>
  </div>
</header>

<div class="song-wrapper">

  <h1 id="song-title"></h1>
<div id="song-artist"></div>
<div id="song-key"></div>
  
  <div
    id="song-content"
    class="song-content">
  </div>

</div>

<script src="js/song.js"></script>

  <footer class="bottom-footer">
  Developed by Phyton Not 2026
</footer>
  
</body>
</html>
