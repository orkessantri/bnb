<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/bassnotboss/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BASS NOT BOSS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
  
<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<h1>BASS NOT BOSS 🎸</h1>

  <input type="text" id="search" placeholder="Cari lagu..." style="width:60%;padding:10px;font-size:16px;">
  <h2>Setlist 🎸</h2>
<div id="setlist"></div>
  
<div id="list"></div>

<script>
let allSongs = [];
let setlist = [];

fetch('songs.json')
  .then(res => res.json())
  .then(data => {
    allSongs = data;
    renderList(data);
  });

function renderList(data){
  let grouped = {};

  data.forEach(song => {
    if(!grouped[song.category]){
      grouped[song.category] = [];
    }
    grouped[song.category].push(song);
  });

  let html = '';

  for(let cat in grouped){
    html += `<h2>${cat}</h2>`;

    grouped[cat].forEach(song => {
      html += `
        <div class="song-item">
          <a href="songs/${song.file}">${song.title}</a>
          <button class="add-btn" data-title="${song.title}" data-file="${song.file}">+</button>
        </div>
      `;
    });
  }

  document.getElementById('list').innerHTML = html;

  // 🔥 PASANG EVENT SETELAH RENDER
  document.querySelectorAll('.add-btn').forEach(btn => {
    btn.addEventListener('click', function(){
      addSetlist(this.dataset.title, this.dataset.file);
    });
  });
}

function addSetlist(title, file){
  setlist.push({title, file});
  renderSetlist();
}

function renderSetlist(){
  let html = '';

  setlist.forEach((song, i) => {
    html += `
      <div class="song-item">
        <a href="songs/${song.file}">${i+1}. ${song.title}</a>
        <button class="btn-remove" data-index="${i}">×</button>
      </div>
    `;
  });

  document.getElementById('setlist').innerHTML = html;

  // 🔥 PASANG EVENT SETELAH RENDER
  document.querySelectorAll('.btn-remove').forEach(btn => {
    btn.addEventListener('click', function(){
      const index = parseInt(this.dataset.index); // WAJIB parseInt
      removeSetlist(index);
    });
  });
}
  
function removeSetlist(i){
  setlist.splice(i, 1);
  renderSetlist();
}

// SEARCH
document.getElementById('search').addEventListener('input', function(){
  let q = this.value.toLowerCase();

  let filtered = allSongs.filter(song =>
    song.title.toLowerCase().includes(q)
  );

  renderList(filtered);
});
</script>

</body>
</html>
