<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ADMIN</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">

  </head>

<body>

<div class="admin-box">

  <h1>ADMIN SONG</h1>

 <div class="admin-top-grid">

  <input
    type="text"
    id="song-id"
    readonly>

  <input
    type="text"
    id="song-key"
    placeholder="DO / Key Lagu">

  <input
    type="text"
    id="song-category"
    list="category-list"
    placeholder="Kategorine Sam!">

  <input
    type="text"
    id="song-artist"
    placeholder="Artise Sopo lik?">

</div>

<input
  type="text"
  id="song-title"
  placeholder="Judule Opo?">

<datalist id="category-list">

  <option value="ISLAMIC">
  <option value="ARABIC">
  <option value="DUNGDAT">
  <option value="INDO">
  <option value="MANCA">

</datalist>

<textarea id="song-content">
[Intro]

[Verse]

[Pre Chorus]

[Chorus]

[Interlude]

[Flute]
[Lead]

[Outro]</textarea>

<div class="admin-actions">

  <button onclick="generateJSON()">
    GENERATE
  </button>

  <button onclick="copyJSON()">
    COPY
  </button>

  <button onclick="clearForm()">
    CLEAR
  </button>

</div>

  <pre id="output"></pre>

  <div class="edit-box">

  <div class="edit-title">
    EDIT LAGU
  </div>

  <select id="song-select">

    <option value="">
      Pilih Lagu
    </option>

  </select>

</div>
</div>

   <!-- FLOAT BUTTON -->
  <div class="floating-buttons">

    <button onclick="location.href='menu.html'">
      🏠
    </button>
    
  </div>
  
<script src="js/admin.js"></script>
  
</body>
</html>
