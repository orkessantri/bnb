<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ADMIN</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">

  </head>

<body>

<div class="admin-box">

  <h1>ADMIN SONG</h1>

 <input
  type="text"
  id="song-id"
  readonly>

  <input
    type="text"
    id="song-title"
    placeholder="Judule Opo?">

<input
  type="text"
  id="song-category"
  list="category-list"
  placeholder="Kategorine Sam!">

<datalist id="category-list">

  <option value="Sholawat">
  <option value="Arabic">
  <option value="Dungdat">
  <option value="Populer">

</datalist>

<textarea id="song-content">
[Intro]
  
[Verse]

[Pre Chorus]

[Chorus]

[Interlude]

[Outro]</textarea>

<button onclick="generateJSON()">
  GENERATE JSON
</button>

<button onclick="copyJSON()" style="margin-top:10px;">
  COPY JSON
</button>

  <pre id="output"></pre>

</div>

<script src="js/admin.js"></script>
  
</body>
</html>
