<script>
let allSongs = [];

fetch('songs.json')
  .then(res => res.json())
  .then(data => {
    allSongs = data;

    const urlParams = new URLSearchParams(window.location.search);
    const cat = urlParams.get('cat');

    if(cat){
      const filtered = data.filter(song => song.category === cat);
      renderList(filtered);
    } else {
      renderList(data);
    }
  });
</script>
