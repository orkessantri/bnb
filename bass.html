<!DOCTYPE html>
<html lang="id">

<head>
  <link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Rubik+Marker+Hatch&display=swap"
rel="stylesheet">
  
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Bass Theory</title>

  <link
    rel="stylesheet"
    href="css/global.css"
  >

  <link
    rel="stylesheet"
    href="css/bass.css"
  >

</head>

<body class="dark-mode">

  <!-- HEADER -->
  <header class="top-header">

    <div class="header-inner">

      <img
        src="assets/logo.png"
        class="header-logo"
      >

      <div class="brand-title">
        BASS -not- BOSS
      </div>

    </div>

  </header>

<!-- CONTENT -->
<div class="bass-wrapper">

  <h2 class="page-title">
    REFERENCE
  </h2>

  <!-- SELECTORS -->
  <div class="scale-controls">

    <!-- ROOT NOTE -->
    <select id="root-select">

      <option value="C">C</option>
      <option value="C#">C#</option>
      <option value="D">D</option>
      <option value="D#">D#</option>
      <option value="E">E</option>
      <option value="F">F</option>
      <option value="F#">F#</option>
      <option value="G">G</option>
      <option value="G#">G#</option>
      <option value="A">A</option>
      <option value="A#">A#</option>
      <option value="B">B</option>

    </select>

    <!-- SCALE SELECT -->
    <select id="scale-select"></select>

  </div>

    <!-- FRETBOARD -->
  <div id="fretboard"></div>
  
 </div>

 <!-- SCALE INFO -->
  <div id="scale-info"></div>
  
  <div id="scale-notes"></div>

    <div id="scale-formula"></div>

    <div id="scale-intervals"></div>
  
</div>
  
  <!-- FOOTER -->
  <footer class="bottom-footer">
    Developed by Phyton Not 2026
  </footer>

  <script src="js/bass.js"></script>

</body>
</html>
