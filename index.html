<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/bassnotboss">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BASS NOT BOSS</title>

<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<h1>BASS NOT BOSS 🎸</h1>

<div id="list"></div>

<script>
fetch('songs.json')
  .then(res => res.json())
  .then(data => {
    let html = '';
    data.forEach(song => {
      html += `<div><a href="songs/${song.file}">${song.title}</a></div>`;
    });
    document.getElementById('list').innerHTML = html;
  });
</script>

</body>
</html>
