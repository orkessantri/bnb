<!DOCTYPE html>
<html>
<head>
<link rel="manifest" href="/bassnotboss/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BASS NOT BOSS</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
  
<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<h1>BASS NOT BOSS 🎸</h1>

<div id="list"></div>

<script>
fetch('songs.json')
  .then(res => res.json())
  .then(data => {

    let grouped = {};

    data.forEach(song => {
      if(!grouped[song.category]){
        grouped[song.category] = [];
      }
      grouped[song.category].push(song);
    });

    let html = '';

    for(let cat in grouped){
      html += `<h2>${cat}</h2>`;

      grouped[cat].forEach(song => {
        html += `<div><a href="songs/${song.file}">${song.title}</a></div>`;
      });
    }

    document.getElementById('list').innerHTML = html;
  });
</script>

</body>
</html>
