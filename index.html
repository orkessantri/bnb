<body class="home">

<div class="home-screen">
<h1 class="title">
  <span>BASS</span>
  <span>-not-</span>
  <span>BOSS</span>
</h1>
<button
  class="enter-btn"
  onclick="enterApp()"
>
  ENTER
</button>
</div>

<script>

async function enterApp(){

  // FULLSCREEN
  if(
    document.documentElement
      .requestFullscreen
  ){

    await document
      .documentElement
      .requestFullscreen();

  }

  // DELAY
  setTimeout(() => {

    window.location.href =
      "menu.html";

  }, 300);

}

</script>
    
</body>
