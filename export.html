<!DOCTYPE html>
<html lang="id">

<head>
  <link
rel="preconnect"
href="https://fonts.googleapis.com">

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Rubik+Marker+Hatch&display=swap"
rel="stylesheet">
  
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    Export Setlist
  </title>

  <link
    rel="stylesheet"
    href="global.css"
  >

  <link
    rel="stylesheet"
    href="export.css"
  >

</head>

<body>

  <header class="top-header">

    <div class="header-inner">

      <img
        src="assets/logo.png"
        class="header-logo"
      >

      <div class="brand-title">
        BNB
      </div>

    </div>

  </header>

<main class="page-wrapper">

  <h1 class="page-title">
    Export Setlist
  </h1>

  <div class="export-header-box">

    <label class="upload-logo">

      <input
        type="file"
        id="logoInput"
        accept="image/*"
        hidden
      >

      <img
        id="logoPreview"
        src=""
      >

      <span>
        Upload Logo
      </span>

    </label>

    <div class="event-form">

      <input
        type="text"
        id="band-name"
        placeholder="Nama Band"
      >

      <input
        type="text"
        id="event-name"
        placeholder="Nama Acara"
      >

      <input
        type="text"
        id="event-date"
        placeholder="Tanggal Acara"
      >

      <input
        type="text"
        id="event-location"
        placeholder="Lokasi Acara"
      >

    </div>

  </div>

  <div id="export-table">
  </div>

</main>

  <script src="export.js"></script>

</body>
</html>
